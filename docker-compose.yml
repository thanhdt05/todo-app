version: '3.9'

services:
  todoapp:
    container_name: todoapp
    image: thanhdt05/todoapp:1.0.0
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ".:/var/www/html"
    env_file:
      - .env
    depends_on:
      - db
    
  db:
    container_name: db
    image: postgres:16
    environment:
      POSTGRES_DB: todo_app
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - "pgdata:/var/lib/postgresql/data"

volumes:
  pgdata: {}